<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Partonggoan Tumpuan Sumbayak 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c040;
  --gold2: #c9860a;
  --red: #8b1a05;
  --red2: #c9400a;
  --dark: #1e0a04;
  --cream: rgba(212,149,106,0.85);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:#0d0502;
  font-family:'Lato',sans-serif;
  display:flex; flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:0;
}

/* ===== FLYER ===== */
.flyer {
  width:100%; max-width:680px;
  background:linear-gradient(175deg,#1e0a04 0%,#2e1008 40%,#1a0804 70%,#280d06 100%);
  position:relative; overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

/* GORGA */
.gorga-bar {
  width:100%; height:18px;
  background:repeating-linear-gradient(90deg,
    #8b1a05 0,#8b1a05 8px,#c9860a 8px,#c9860a 16px,
    #f0c040 16px,#f0c040 20px,#c9860a 20px,#c9860a 28px,
    #8b1a05 28px,#8b1a05 36px,#f0c040 36px,#f0c040 40px,
    #c9860a 40px,#c9860a 48px,#8b1a05 48px,#8b1a05 56px);
}
.gorga-thin {
  width:100%; height:5px;
  background:linear-gradient(90deg,#8b1a05,#f0c040 30%,#c9860a 50%,#f0c040 70%,#8b1a05);
}
.gorga-mid {
  width:100%; height:40px;
  background:repeating-linear-gradient(90deg,
    #6b1304 0,#6b1304 6px,#a0520a 6px,#a0520a 12px,
    #c9860a 12px,#c9860a 15px,#a0520a 15px,#a0520a 21px,
    #6b1304 21px,#6b1304 27px,#a0520a 27px,#a0520a 33px,
    #c9860a 33px,#c9860a 36px,#a0520a 36px,#a0520a 42px);
  display:flex; align-items:center; justify-content:center;
}
.gorga-badge {
  background:linear-gradient(135deg,#1e0a04,#3a1208);
  border:2px solid #f0c040; padding:4px 28px;
  font-family:'Cinzel',serif; font-size:11px; font-weight:700;
  color:#f0c040; letter-spacing:4px; text-transform:uppercase;
}

/* HEADER */
.header { padding:24px 5vw 18px; text-align:center; position:relative; }
.header::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:100%; height:260px;
  background:radial-gradient(ellipse,rgba(180,60,10,0.2) 0%,transparent 70%);
  pointer-events:none;
}
.logo-row { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px; }
.logo-wrap { position:relative; flex-shrink:0; }
.logo-wrap::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:2px solid #c9860a; box-shadow:0 0 16px rgba(201,134,10,0.5);
}
.logo-img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #f0c040; }
.org-info { text-align:left; }
.org-name1 {
  font-family:'Cinzel',serif; font-size:clamp(10px,2.5vw,13px); font-weight:700;
  color:#f0c040; letter-spacing:1px; line-height:1.6; text-transform:uppercase;
}
.org-name2 {
  font-family:'Lato',sans-serif; font-size:clamp(9px,2vw,11px);
  color:#c9860a; letter-spacing:2px; text-transform:uppercase; margin-top:3px;
}
.divider { display:flex; align-items:center; gap:10px; margin:8px 0 12px; }
.divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,#c9860a 40%,#c9860a 60%,transparent); }
.divider-cross { color:#f0c040; font-size:20px; }
.label-undangan { font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; color:#c9860a; text-transform:uppercase; margin-bottom:6px; }
.main-title {
  font-family:'Playfair Display',serif; font-weight:900;
  font-size:clamp(38px,10vw,60px); color:#fff;
  text-shadow:0 4px 30px rgba(201,134,10,0.5); line-height:1; margin-bottom:5px;
}
.title-accent { font-family:'Cinzel Decorative',serif; font-size:clamp(11px,3vw,15px); color:#f0c040; letter-spacing:3px; }

/* SECTION LABEL */
.section-label {
  text-align:center; font-family:'Cinzel',serif; font-size:10px; font-weight:700;
  color:#c9860a; letter-spacing:5px; text-transform:uppercase; padding:20px 0 12px;
}

/* TUAN RUMAH */
.photo-full { margin:0 5vw; position:relative; }
.photo-full::before {
  content:''; position:absolute; inset:-5px; border-radius:12px;
  background:linear-gradient(135deg,#c9860a,#f0c040,#a0520a,#f0c040,#c9860a); z-index:0;
}
.photo-full-inner { position:relative; z-index:1; border-radius:8px; overflow:hidden; margin:5px; line-height:0; }
.img-couple { width:100%; height:auto; display:block; filter:brightness(1.05) contrast(1.04) saturate(1.08); }

.caption-box { margin:0 5vw; margin-top:14px; text-align:center; }
.caption-name { font-family:'Playfair Display',serif; font-size:clamp(16px,4.5vw,22px); font-weight:700; color:#fff; line-height:1.3; }
.caption-role { font-family:'Cinzel',serif; font-size:10px; font-weight:600; color:#c9860a; letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
.caption-detail { font-family:'Lato',sans-serif; font-size:12px; color:var(--cream); margin-top:3px; line-height:1.5; }

/* SEPARATOR */
.photo-sep { display:flex; align-items:center; gap:12px; margin:20px 5vw 0; }
.photo-sep-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,134,10,0.5),transparent); }
.photo-sep-star { color:#c9860a; font-size:13px; letter-spacing:3px; }

/* PARAMBILAN */
.parambilan-section { display:flex; flex-direction:column; align-items:center; padding:0 5vw 4px; }
.photo-parambilan-wrap { position:relative; }
.photo-parambilan-wrap::before {
  content:''; position:absolute; inset:-5px; border-radius:12px;
  background:linear-gradient(135deg,#c9860a,#f0c040,#a0520a,#f0c040,#c9860a); z-index:0;
}
.photo-parambilan-inner { position:relative; z-index:1; border-radius:8px; overflow:hidden; margin:5px; line-height:0; }
.img-parambilan { width:min(220px,55vw); height:auto; display:block; filter:brightness(1.05) contrast(1.04) saturate(1.08); }
.caption-parambilan { margin-top:12px; text-align:center; }

/* DETAIL BOX */
.details-wrap { margin:22px 5vw 0; border:1px solid rgba(201,134,10,0.35); border-radius:8px; overflow:hidden; }
.details-header {
  background:linear-gradient(90deg,#6b1304,#a0350a,#6b1304); padding:10px 20px; text-align:center;
  font-family:'Cinzel',serif; font-size:11px; font-weight:700; color:#f0c040; letter-spacing:4px; text-transform:uppercase;
}
.details-body { padding:18px 20px; background:rgba(255,255,255,0.03); display:grid; grid-template-columns:1fr 1fr; gap:14px 20px; }
.det-item { display:flex; gap:10px; align-items:flex-start; }
.det-icon { font-size:18px; flex-shrink:0; line-height:1.2; }
.det-key { font-family:'Lato',sans-serif; font-size:9px; font-weight:700; color:#c9860a; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
.det-val { font-family:'Playfair Display',serif; font-size:clamp(13px,3.5vw,17px); font-weight:700; color:#fff; line-height:1.25; }
.det-val.sm { font-size:clamp(12px,3vw,15px); }

/* VERSE */
.verse { text-align:center; padding:8px 6vw 14px; font-family:'Lato',sans-serif; font-style:italic; font-size:11px; color:rgba(212,149,106,0.65); line-height:1.7; }

/* ==============================
   TOMBOL HADIR — ANIMATED
   ============================== */
.hadir-section {
  width:100%; max-width:680px;
  padding:28px 5vw 0;
  display:flex; flex-direction:column; align-items:center;
}

.hadir-headline {
  font-family:'Playfair Display',serif; font-size:clamp(16px,5vw,22px);
  color:#f0c040; text-align:center; margin-bottom:6px;
}
.hadir-subline {
  font-family:'Lato',sans-serif; font-size:12px; color:var(--cream);
  text-align:center; margin-bottom:20px;
}

/* Animated CTA button */
.btn-hadir-wrap { position:relative; display:inline-flex; justify-content:center; }

/* ripple rings */
.btn-hadir-wrap::before,
.btn-hadir-wrap::after {
  content:'';
  position:absolute; inset:-8px; border-radius:60px;
  border:2px solid rgba(240,192,64,0.5);
  animation:ripple 2s ease-out infinite;
}
.btn-hadir-wrap::after { animation-delay:1s; }

@keyframes ripple {
  0%   { transform:scale(1); opacity:0.7; }
  100% { transform:scale(1.3); opacity:0; }
}

.btn-hadir {
  position:relative; z-index:2;
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,#8b1a05,#c9400a 50%,#8b1a05);
  border:2px solid #f0c040; border-radius:50px;
  padding:16px 40px;
  font-family:'Cinzel',serif; font-size:clamp(15px,4vw,19px); font-weight:700;
  color:#f0c040; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; outline:none;
  box-shadow:0 0 30px rgba(201,134,10,0.4), 0 4px 20px rgba(0,0,0,0.5);
  animation:pulse-btn 2.5s ease-in-out infinite;
  transition:transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-hadir:active { transform:scale(0.96); }

@keyframes pulse-btn {
  0%,100% { box-shadow:0 0 20px rgba(240,192,64,0.3), 0 4px 20px rgba(0,0,0,0.5); }
  50%      { box-shadow:0 0 50px rgba(240,192,64,0.7), 0 8px 30px rgba(0,0,0,0.5); }
}

.btn-hadir .icon { font-size:22px; animation:wave 1.5s ease-in-out infinite; }
@keyframes wave {
  0%,100% { transform:rotate(-10deg) scale(1); }
  50%      { transform:rotate(10deg) scale(1.15); }
}

/* bouncing arrow below button */
.bounce-arrow {
  margin-top:12px; color:#f0c040; font-size:22px;
  animation:bounce-down 1.2s ease-in-out infinite;
}
@keyframes bounce-down {
  0%,100% { transform:translateY(0); opacity:0.6; }
  50%      { transform:translateY(6px); opacity:1; }
}

/* ==============================
   RSVP DROPDOWN
   ============================== */
.rsvp-dropdown {
  width:100%; max-width:680px;
  overflow:hidden;
  max-height:0;
  transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
  opacity:0;
}
.rsvp-dropdown.open {
  max-height:800px;
  opacity:1;
}

.rsvp-box {
  margin:16px 5vw 0;
  background:linear-gradient(160deg,#1e0a04,#2e1008);
  border:1px solid rgba(201,134,10,0.4);
  border-radius:12px; padding:24px 20px;
}

.rsvp-title {
  font-family:'Cinzel',serif; font-size:13px; font-weight:700;
  color:#f0c040; letter-spacing:3px; text-transform:uppercase;
  text-align:center; margin-bottom:20px;
}

.form-group { margin-bottom:16px; position:relative; }
.form-label { font-family:'Lato',sans-serif; font-size:11px; font-weight:700; color:#c9860a; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; display:block; }

/* Name input with autocomplete */
.name-input-wrap { position:relative; }
.name-input {
  width:100%; padding:13px 16px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,134,10,0.4);
  border-radius:8px; color:#fff; font-family:'Lato',sans-serif; font-size:15px;
  outline:none; transition:border-color 0.2s;
  -webkit-appearance:none;
}
.name-input:focus { border-color:#f0c040; background:rgba(255,255,255,0.09); }
.name-input::placeholder { color:rgba(212,149,106,0.4); }

.autocomplete-list {
  position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:100;
  background:#2a0d06; border:1px solid rgba(201,134,10,0.5);
  border-radius:8px; overflow:hidden;
  max-height:200px; overflow-y:auto;
  display:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.6);
}
.autocomplete-list.show { display:block; }
.autocomplete-item {
  padding:12px 16px; font-family:'Lato',sans-serif; font-size:14px;
  color:#fff; cursor:pointer; border-bottom:1px solid rgba(201,134,10,0.15);
  transition:background 0.15s;
}
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover, .autocomplete-item.active { background:rgba(201,134,10,0.2); color:#f0c040; }

/* Number input */
.jumlah-row { display:flex; align-items:center; gap:12px; }
.jumlah-btn {
  width:42px; height:42px; border-radius:8px;
  background:rgba(201,134,10,0.2); border:1px solid rgba(201,134,10,0.5);
  color:#f0c040; font-size:22px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:background 0.15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.jumlah-btn:active { background:rgba(201,134,10,0.4); }
.jumlah-display {
  flex:1; text-align:center;
  font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
  color:#fff;
}
.jumlah-label { font-family:'Lato',sans-serif; font-size:12px; color:var(--cream); }

/* Action buttons */
.action-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
.btn-action {
  padding:14px 10px; border-radius:10px; border:2px solid;
  font-family:'Cinzel',serif; font-size:clamp(11px,3vw,13px); font-weight:700;
  letter-spacing:1px; cursor:pointer; text-align:center;
  transition:transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
  outline:none;
}
.btn-action:active { transform:scale(0.96); }
.btn-hadir-yes {
  background:linear-gradient(135deg,#1a5e1a,#2d8b2d);
  border-color:#4caf50; color:#c8f7c5;
  box-shadow:0 4px 16px rgba(76,175,80,0.3);
}
.btn-hadir-no {
  background:linear-gradient(135deg,#5e1a1a,#8b2d2d);
  border-color:#f44336; color:#f7c5c5;
  box-shadow:0 4px 16px rgba(244,67,54,0.3);
}

/* Toast notification */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#1a5e1a,#2d8b2d);
  border:1px solid #4caf50; border-radius:10px;
  padding:14px 24px; color:#c8f7c5;
  font-family:'Lato',sans-serif; font-size:13px; font-weight:700;
  z-index:9999; transition:transform 0.3s, opacity 0.3s;
  opacity:0; white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background:linear-gradient(135deg,#5e1a1a,#8b2d2d); border-color:#f44336; color:#f7c5c5; }

/* ==============================
   DAFTAR HADIR
   ============================== */
.list-section {
  width:100%; max-width:680px;
  padding:24px 5vw 40px;
}
.list-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.list-title {
  font-family:'Cinzel',serif; font-size:12px; font-weight:700;
  color:#f0c040; letter-spacing:4px; text-transform:uppercase;
}
.list-count {
  background:rgba(201,134,10,0.2); border:1px solid rgba(201,134,10,0.4);
  border-radius:20px; padding:4px 14px;
  font-family:'Lato',sans-serif; font-size:12px; font-weight:700; color:#f0c040;
}

.gorga-thin-sep { width:100%; height:3px; background:linear-gradient(90deg,transparent,#c9860a,transparent); margin-bottom:16px; }

.attendee-card {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,0.04); border:1px solid rgba(201,134,10,0.2);
  border-radius:8px; padding:12px 16px; margin-bottom:8px;
  animation:slide-in 0.3s ease;
}
@keyframes slide-in {
  from { opacity:0; transform:translateY(-10px); }
  to   { opacity:1; transform:translateY(0); }
}
.attendee-name {
  font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#fff;
}
.attendee-status {
  display:flex; align-items:center; gap:8px;
}
.status-badge {
  font-family:'Lato',sans-serif; font-size:11px; font-weight:700;
  padding:3px 10px; border-radius:20px; letter-spacing:1px;
}
.badge-hadir { background:rgba(76,175,80,0.2); color:#4caf50; border:1px solid rgba(76,175,80,0.4); }
.badge-ijin  { background:rgba(244,67,54,0.2);  color:#f44336; border:1px solid rgba(244,67,54,0.4); }
.attendee-jumlah {
  font-family:'Lato',sans-serif; font-size:13px; font-weight:700; color:#f0c040;
  background:rgba(240,192,64,0.1); border-radius:6px; padding:2px 8px;
  margin-left:4px;
}

.empty-state {
  text-align:center; padding:30px 0;
  font-family:'Lato',sans-serif; font-size:13px; color:rgba(212,149,106,0.5); font-style:italic;
}

.summary-bar {
  display:flex; gap:10px; margin-bottom:16px;
}
.summary-chip {
  flex:1; border-radius:8px; padding:10px;
  text-align:center; border:1px solid;
}
.chip-hadir { background:rgba(76,175,80,0.1); border-color:rgba(76,175,80,0.3); }
.chip-ijin  { background:rgba(244,67,54,0.1);  border-color:rgba(244,67,54,0.3); }
.chip-num  { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#fff; }
.chip-lbl  { font-family:'Lato',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--cream); margin-top:2px; }
</style>
</head>
<body>

<!-- ===== FLYER ===== -->
<div class="flyer">
  <div class="gorga-bar"></div>
  <div class="gorga-thin"></div>

  <div class="header">
